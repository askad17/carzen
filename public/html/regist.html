<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Carzen</title>
    <link rel="stylesheet" href="/public/css/st_regist.css">
</head>
<body>
    <!-- Animated Background Lines -->
    <div class="animated-lines">
        <div class="line line-1"></div>
        <div class="line line-2"></div>
        <div class="line line-3"></div>
        <div class="line line-4"></div>
        <div class="line line-5"></div>
    </div>
    
    <!-- Grid Pattern Overlay -->
    <div class="grid-overlay"></div>

    <div class="registration-page">
        <div class="registration-container">
            <div class="registration-card">
                <h1 class="registration-title">Регистрация</h1>
                
                <form class="registration-form" id="registrationForm">
                    <div class="form-group">
                        <input type="text" class="form-input" id="login" placeholder="Логин" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <input type="password" class="form-input" id="password" placeholder="Пароль" required>
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-input" id="passwordConfirm" placeholder="Повторить пароль" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <input type="text" class="form-input" id="firstName" placeholder="Имя" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="text" class="form-input" id="lastName" placeholder="Фамилия" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="text" class="form-input" id="middleName" placeholder="Отчество">
                    </div>
                    
                    <div class="form-group">
                        <input type="tel" class="form-input" id="phone" placeholder="Номер телефона" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="email" class="form-input" id="email" placeholder="Адрес электронной почты" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="date" class="form-input" id="birthDate" required>
                    </div>
                    
                    <button type="submit" class="btn-submit">Зарегистрироваться</button>
                    
                    <div class="form-footer">
                        <a href="/public/html/login.html" class="login-link">Уже есть аккаунт</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Success Notification -->
    <div class="notification" id="successNotification">
        <div class="notification-content">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <span>Вы зарегистрированы на сайте Carzen</span>
        </div>
    </div>

    <script src="/public/js/src_regist.js"></script>
</body>
</html>
