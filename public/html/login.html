<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - Carzen</title>
    <link rel="stylesheet" href="/public/css/st_login.css">
</head>
<body>
    <div class="animated-lines">
        <div class="line line-1"></div>
        <div class="line line-2"></div>
        <div class="line line-3"></div>
        <div class="line line-4"></div>
        <div class="line line-5"></div>
    </div>

    <div class="grid-overlay"></div>

    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <h1 class="login-title">Авторизация</h1>
                
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <input type="text" class="form-input" id="login" placeholder="Логин" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" class="form-input" id="password" placeholder="Пароль" required>
                    </div>
                    
                    <button type="submit" class="btn-submit">Отправить</button>
                    
                    <div class="form-footer">
                        <a href="/public/html/regist.html" class="register-link">Зарегистрироваться</a>
                        <a href="/public/html/menu.html" class="back-link">На главную</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="notification error" id="errorNotification">
        <div class="notification-content">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>Неверный логин или пароль</span>
        </div>
    </div>

    <script type="module" src="/public/js/src_login.js"></script>
</body>
</html>
